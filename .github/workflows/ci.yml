name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          # Lint all .md files; ignore node_modules and .github internals
          if [[ -f .markdownlint.json ]]; then
            markdownlint '**/*.md' \
              --ignore 'node_modules/**' \
              --ignore '.github/**' \
              --config .markdownlint.json
          else
            markdownlint '**/*.md' \
              --ignore 'node_modules/**' \
              --ignore '.github/**' \
              --disable MD009 MD012 MD013 MD022 MD026 MD029 MD031 MD032 MD033 MD034 MD036 MD040 MD041 MD060
          fi

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    outputs:
      had_broken_links: ${{ steps.markdown_links.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        id: markdown_links
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368  # v1
        # Intentionally using action defaults (no repo-local .mlc-config.json override).
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          folder-path: '.'
          file-extension: '.md'
        # Treat broken links as warnings, not hard failures, for doc repos
        continue-on-error: true

      - name: Surface non-blocking link-check warning
        if: steps.markdown_links.outcome == 'failure'
        run: echo "Broken markdown links detected. See the link-check job logs."

  meta-hygiene:
    name: Meta hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate metadata JSON
        run: python3 -m json.tool docs/meta/source-to-export-map.json > /dev/null

      - name: Ensure metadata does not leak absolute local paths
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          source_map_path = pathlib.Path("docs/meta/source-to-export-map.json")
          data = json.loads(source_map_path.read_text())
          absolute_path = re.compile(r'^(?:/|[A-Za-z]:[/\\])')

          def is_absolute_local_path(value: str) -> bool:
              return bool(absolute_path.match(value)) or value.startswith("\\")

          def walk(value, pointer: str = "$") -> None:
              if isinstance(value, str):
                  if is_absolute_local_path(value):
                      print(f"Absolute local path leak detected at {pointer}: {value}")
                      sys.exit(1)
                  return

              if isinstance(value, dict):
                  for key, child in value.items():
                      if isinstance(key, str) and is_absolute_local_path(key):
                          print(f"Absolute local path leak detected at {pointer}.{key}: {key}")
                          sys.exit(1)
                      walk(child, f"{pointer}.{key}")
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      walk(child, f"{pointer}[{index}]")

          walk(data)
          PY

      - name: Check workflow and metadata files for trailing whitespace
        shell: bash
        run: |
          set -euo pipefail
          if grep -nHE '[[:blank:]]+$' .github/workflows/*.yml docs/meta/*.json; then
            echo "Trailing whitespace detected in workflow or metadata files"
            exit 1
          fi

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - markdown-lint
      - link-check
      - meta-hygiene
    if: always()
    steps:
      - name: Summarize results
        shell: bash
        run: |
          set -euo pipefail
          echo "markdown-lint : ${{ needs.markdown-lint.result }}"
          if [[ "${{ needs.link-check.outputs.had_broken_links }}" == "true" ]]; then
            echo "link-check    : warning (broken links detected; non-blocking)"
          else
            echo "link-check    : ${{ needs.link-check.result }}"
          fi
          echo "meta-hygiene  : ${{ needs.meta-hygiene.result }}"

          for r in "${{ needs.markdown-lint.result }}" "${{ needs.link-check.result }}" "${{ needs.meta-hygiene.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "One or more CI jobs failed/cancelled."
              exit 1
            fi
          done

          echo "CI summary: OK"
