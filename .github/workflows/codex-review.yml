name: Codex review trigger

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

# Automatic Codex review comments are disabled so routine pull requests do not
# receive `@codex review`. Manual PR comments containing `@codex review` still
# work unchanged.

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Automatic Codex review disabled
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            core.info('Automatic Codex review trigger is disabled. Post @codex review manually when needed.')
